# All SVG visual properties live here — the single, opinionated theme.
# Geometry (deployment/*.yml, terrain/gw.yml) and behaviour (base.yml draw
# flags) carry no styling. snake_case keys are converted to kebab-case SVG attributes; keys already in
# kebab-case (e.g. vector-effect) pass through unchanged.

background:
  fill: "#f4f1e8"

half_way_lines:
  stroke: black
  stroke_dasharray: 0.5 0.5
  stroke_width: 0.2
  opacity: 0.5

deployment:
  attacker:
    fill: "#cf4b33"
    stroke: none
    stroke_width: 0.4
  defender:
    fill: "#7d8b7f"
    stroke: none
    stroke_width: 0.4

building:
  group:
    opacity: 1
  template:
    default:
      vector-effect: non-scaling-stroke
      stroke: black
      stroke_width: 1.2
      fill: "#808080"
      opacity: 1
    # Ported 40kdc pipes (rust) and barricades (sand). The rust/sand hues are
    # anchored here and aliased by area_terrain + feature.palette below so each
    # colour is defined once.
    pipe:             { fill: &rust-fill "#b9772e", stroke: &rust-accent "#6e451a", stroke_width: 0.3 }
    pipe-short:       { fill: *rust-fill, stroke: *rust-accent, stroke_width: 0.3 }
    barricade:        { fill: &sand-fill "#c9a86a", stroke: &sand-accent "#7d6233", stroke_width: 0.3 }
    barricade-rail-5: { fill: *sand-fill, stroke: *sand-accent, stroke_width: 0.3 }
    barricade-rail-3: { fill: *sand-fill, stroke: *sand-accent, stroke_width: 0.3 }

grid:
  opacity: 0.3
  stroke: black
  stroke_width: 0.15
  stroke_dasharray: 0.1 0.1

objective:
  marker:
    fill: "#1a1a1a"
    stroke: white
    stroke_width: 0.3
  label:
    font_size: 2
    fill: white

annotation:
  text:
    font_size: 1.5
    fill: black
  text_outline:
    stroke: white
    stroke_width: 0.3
    paint_order: stroke
  arrow:
    stroke: black
    stroke_width: 0.4

area_terrain:
  default:
    fill: "rgba(140,130,120,0.2)"
    stroke: "#808080"
    stroke_width: 0.3
  Forest:
    fill: "rgba(60,120,60,0.3)"
    stroke: "#3a6b3a"
    stroke_width: 0.3
  Crater:
    fill: "rgba(100,80,60,0.3)"
    stroke: "#6b5030"
    stroke_width: 0.3
  Rubble:
    fill: "rgba(140,130,120,0.3)"
    stroke: "#807060"
    stroke_width: 0.3
  # `feature` is the fallback for any unconsumed area piece. Pipes/barricades
  # are now building placements (see building.template above), but these
  # pipe/barricade labels remain as harmless fallbacks for any hand-authored
  # layout still using them, re-pointed to the rust/sand anchors.
  feature:
    fill: "rgba(120,120,120,0.55)"
    stroke: "#555555"
    stroke_width: 0.3
  pipe:
    fill: *rust-fill
    stroke: *rust-accent
    stroke_width: 0.3
  barricade:
    fill: *sand-fill
    stroke: *sand-accent
    stroke_width: 0.3

icon:
  circle:
    fill: "#e8dcc0"
    stroke: "#33312c"
    stroke_width: 0.25
  glyph:
    fill: "#33312c"

feature:
  stroke_width: 0.2
  palette:
    stone: { fill: "#9aa0a6", accent: "#5b6068" }
    rust: { fill: *rust-fill, accent: *rust-accent }
    sand: { fill: *sand-fill, accent: *sand-accent }
    green: { fill: "#5a7d4a", accent: "#34502c" }
    gunmetal: { fill: "#7f868d", accent: "#3f444a" }
    bone: { fill: "#e8dcc0", accent: "#9a8f76" }
