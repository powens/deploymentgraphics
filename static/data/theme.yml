# All SVG visual properties live here — the single, opinionated theme.
# Geometry (deployment/*.yml, terrain/gw.yml) and behaviour (base.yml draw
# flags) carry no styling. snake_case keys are converted to kebab-case SVG attributes; keys already in
# kebab-case (e.g. vector-effect) pass through unchanged.

background:
  fill: "#f4f1e8"

half_way_lines:
  stroke: black
  stroke_dasharray: 0.5 0.5
  stroke_width: 0.2
  opacity: 0.5

deployment:
  attacker:
    fill: "#cf4b33"
    stroke: none
    stroke_width: 0.4
  defender:
    fill: "#7d8b7f"
    stroke: none
    stroke_width: 0.4

building:
  group:
    opacity: 1
  template:
    vector-effect: non-scaling-stroke
    stroke: black
    stroke_width: 1.2
    fill: "#808080"
    opacity: 1

grid:
  opacity: 0.3
  stroke: black
  stroke_width: 0.15
  stroke_dasharray: 0.1 0.1

objective:
  marker:
    fill: "#1a1a1a"
    stroke: white
    stroke_width: 0.3
  label:
    font_size: 2
    fill: white

annotation:
  text:
    font_size: 1.5
    fill: black
  text_outline:
    stroke: white
    stroke_width: 0.3
    paint_order: stroke
  arrow:
    stroke: black
    stroke_width: 0.4

area_terrain:
  default:
    fill: "rgba(140,130,120,0.2)"
    stroke: "#808080"
    stroke_width: 0.3
  Forest:
    fill: "rgba(60,120,60,0.3)"
    stroke: "#3a6b3a"
    stroke_width: 0.3
  Crater:
    fill: "rgba(100,80,60,0.3)"
    stroke: "#6b5030"
    stroke_width: 0.3
  Rubble:
    fill: "rgba(140,130,120,0.3)"
    stroke: "#807060"
    stroke_width: 0.3

icon:
  circle:
    fill: "#e8dcc0"
    stroke: "#33312c"
    stroke_width: 0.25
  glyph:
    fill: "#33312c"
