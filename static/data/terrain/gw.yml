      - type: small-area
        corners: { BR: { x: 23.5, y: 38 }, TR: { x: 29.5, y: 38 } }
    icons:
      - type: skull
        pos: { x: 30, y: 22 }
      - type: fortress
        pos: { x: 46.5, y: 19 }
        player: defender
      - type: fortress
        pos: { x: 13.5, y: 25 }
        player: attacker
      - type: skull
        pos: { x: 22, y: 5 }
      - type: skull
        pos: { x: 38, y: 39 }
    features:
      # Illustrative single pieces showcasing each feature type — replace
