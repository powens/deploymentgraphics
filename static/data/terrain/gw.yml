# Placeholder terrain layouts for the v2 building-coordinate schema.
# These shapes are illustrative, not official GW layouts — replace them
# when transcribing real terrain.
#
# Building templates live in templates-simple.yml; layouts here reference
# them by name (a building's `type:`). convert:40kdc reads that file for the
# template geometry, and gen:presets merges it with combined.yml.
#
# Each building pins one or two of its corners (keyed by the building
# corner: TL/TR/BL/BR — the template's bounding-box corners) to inward
# distances from a canvas corner — by default the canvas top-left. Two
# corners derive the rotation; a single corner implies no rotation
# (axis-aligned). A building-level `from:` or a per-corner `from:` field
# selects a different canvas corner. Buildings are mirrored 180 degrees
# through the canvas centre unless `mirror: false`.
#
# A layout may also list `icons` (sibling to `templates`): predefined marker
# graphics placed by their circle centre. Each is `{ type: <skull|fortress>,
# pos: { x, y } }` in inches, with an optional `player: <attacker|defender>`
# that tints the icon's disk with that player's deployment colour. Icons are
# styled by theme.yml and drawn on top.
#
# A layout may also list `features` (sibling to `templates`): abstract top-down
# terrain pieces — `type` is one of l-ruin, l-ruin-roof, generator, pipe. Each is
# `{ type, x, y, width, height, color }` in inches (`x`/`y` = top-left of the
# unrotated bounding box), with an optional `rotation` (degrees about the box
# centre). `color` is a theme.yml palette key: stone, rust, sand, green,
# gunmetal, bone. An optional `label` records the material category shared with
# area_terrain (ruin, pipe, generator, barricade, gantry, catwalk); it is
# carried for consistency with the ported 40kdc pieces and does not affect
# styling, which comes from `color`. Features are drawn on top of the buildings.

layout:
  1:
    templates:
      - type: large-pipes
        corners: { BL: { x: 12, y: 6 }, TL: { x: 14.5, y: 6 } }

      - type: large-area
        corners: { TL: { x: 18.5, y: 0 }, TR: { x: 25.5, y: 0 } }

      - type: large-area
        corners: { TR: { x: 17, y: 19.5 } }

      - type: small-pipes
        corners: { BL: { x: 17, y: 31 }, TL: { x: 19, y: 31 } }

      - type: small-pipes
        corners: { BL: { x: 11, y: 39 } }

      - type: shoe
        corners: { TL: { x: 25, y: 16.25 } }

      - type: small-area
        corners: { BL: { x: 19.5, y: 44 } }

      - type: small-area
        corners: { BR: { x: 23.5, y: 38 }, TR: { x: 29.5, y: 38 } }
    icons:
      - type: skull
        pos: { x: 30, y: 22 }
      - type: fortress
        pos: { x: 46.5, y: 19 }
        player: defender
      - type: fortress
        pos: { x: 13.5, y: 25 }
        player: attacker
      - type: skull
        pos: { x: 22, y: 5 }
      - type: skull
        pos: { x: 38, y: 39 }
    features:
      # Illustrative single pieces showcasing each feature type — replace
      # freely. They set `mirror: false` so each shows once; omit that (or set
      # it true) to also get a copy point-reflected through the board centre.
      - type: l-ruin
        label: ruin
        x: 10.5
        y: 24.5
        width: 7
        height: 5
        rotation: -90
        color: green
        mirror: true

      - type: l-ruin-roof
        label: ruin
        x: 43
        y: 3
        width: 5
        height: 7
        color: green
        mirror: false

      - type: generator
        label: generator
        x: 28
        y: 21.5
        width: 5
        height: 3
        rotation: 90
        color: teal
        mirror: false
      - type: pipe
        label: pipe
        x: 33
        y: 15
        width: 6
        height: 2
        color: rust
        mirror: false

  # PATCH (not a standalone layout): the id matches a ported 40kdc layout, so
  # convert:40kdc appends these `features` to the generated entry. The vendored
  # 40kdc source omits the home-objective ruins for this variant (variants 1 & 2
  # have them). These two ruins sit on one home platform; `mirror` (default on)
  # point-reflects them onto the other home platform. Geometry mirrors variant
  # 1's home ruins, shifted onto this variant's home platforms.
  disruption-vs-purge-the-foe-3:
    features:
      - type: l-ruin-mirror
        label: ruin
        x: 43.92
        y: 5.48
        width: 4.5
        height: 5
        rotation: 180
        color: green
      - type: l-ruin-mirror
        label: ruin
        x: 51.603
        y: 9.533
        width: 3
        height: 2
        rotation: 0
        color: green
