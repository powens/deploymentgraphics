# Detailed building templates for the v2 building-coordinate schema.
# These are the real GW terrain footprints, the higher-fidelity counterpart to
# the illustrative shapes in templates-simple.yml. Both files define the same
# template names, so a layout in combined.yml renders against either — the app
# picks one at runtime (the Templates control), and gen:presets uses
# templates-simple.yml for the bundled preset.
#
# A template is a rectangle (`width`/`height`), a polygon footprint
# (`points`: a closed ring of template-local { x, y } inches), or a curved path
# footprint (`start` plus `segments` of line/quad/cubic Béziers). A polygon's
# bounding box is normally derived from its points; here each polygon also
# declares an explicit `width`/`height`, so the solid body fills that box at
# the same size as its templates-simple.yml counterpart, and the small rubble
# nubbins poke *past* the box edge (the declared box is what placement and the
# converter's area-terrain mapping line up against, not the nubbin extent).
#
# Footprints traced from the official GW terrain templates (40k_docs/templates.pdf):
# each piece's organic rubble edge is captured as a polygon, then scaled so the
# body matches templates-simple.yml's box (large-pipes 10x2.5, small-pipes 6x2,
# small-area 4x6, large-area 7x11.5, shoe 8x11.5). large-area / shoe / shoe-mirror
# follow the converter's transpose + trapezoid conventions (portrait, shoe
# narrow-at-top / wide-at-bottom, shoe-mirror its vertical flip — a piece and its
# 180° copy interlock into a clean rectangle).

templates:
  # long line plate (10 x 2.5) — area-long-line
  # body fills the box; a bump on the top edge and one on the bottom poke past it.
  large-pipes:
    width: 10
    height: 2.5
    points:
      - { x: 0, y: 0.01 }
      - { x: 2.63, y: 0 }
      - { x: 3.08, y: -0.34 }
      - { x: 4.05, y: -0.55 }
      - { x: 4.25, y: -0.47 }
      - { x: 4.51, y: -0.09 }
      - { x: 4.74, y: 0 }
      - { x: 10, y: -0.01 }
      - { x: 10, y: 0.95 }
      - { x: 9.99, y: 2.5 }
      - { x: 9.53, y: 2.53 }
      - { x: 8.66, y: 2.95 }
      - { x: 8.17, y: 3.05 }
      - { x: 7.85, y: 3 }
      - { x: 7.44, y: 2.56 }
      - { x: 7.19, y: 2.49 }
      - { x: 2.78, y: 2.49 }
      - { x: 2.36, y: 2.64 }
      - { x: 1.47, y: 2.49 }
      - { x: 0, y: 2.49 }

  # short line plate (6 x 2) — area-short-line
  # body fills the box; a bump on the top edge and one on the bottom poke past it.
  small-pipes:
    width: 6
    height: 2
    points:
