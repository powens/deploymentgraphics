# Detailed building templates for the v2 building-coordinate schema.
# These are the real GW terrain footprints, the higher-fidelity counterpart to
# the illustrative shapes in templates-simple.yml. Both files define the same
# template names, so a layout in combined.yml renders against either — the app
# picks one at runtime (the Templates control), and gen:presets uses
# templates-simple.yml for the bundled preset.
#
# A template is a rectangle (`width`/`height`), a polygon footprint
# (`points`: a closed ring of template-local { x, y } inches, bounding box
# starting at 0,0; width/height derived), or a curved path footprint
# (`start` plus `segments` of line/quad/cubic Béziers, with a declared
# `width`/`height` bounding box).
#
# Footprints traced from the official GW terrain templates (40k_docs/templates.pdf):
# each piece's organic rubble edge is captured as a polygon. Isolated nubs (small
# spikes that poked past the body) have been trimmed so they no longer drive the
# bounding box; the de-nubbed shapes are then scaled to the same placeholder
# bounding boxes as templates-simple.yml (large-pipes 10x2.5, small-pipes 6x2,
# small-area 4x6, large-area 7x11.5, shoe 8x11.5) so the converter's area-terrain
# mapping (scripts/area-to-building.mjs) and existing placements still line up.
# large-area / shoe / shoe-mirror are oriented to the converter's transpose +
# trapezoid conventions (portrait, shoe narrow-at-top / wide-at-bottom,
# shoe-mirror its vertical flip — a piece and its 180° copy interlock into a
# clean rectangle).

templates:
  # long line plate (10 x 2.5) — area-long-line
  large-pipes:
    points:
      - { x: 0, y: 0.03 }
      - { x: 2.63, y: 0.01 }
      - { x: 4.74, y: 0.01 }
      - { x: 10, y: 0 }
      - { x: 10, y: 0.94 }
      - { x: 9.99, y: 2.44 }
      - { x: 9.53, y: 2.47 }
      - { x: 7.44, y: 2.5 }
      - { x: 7.19, y: 2.43 }
      - { x: 2.78, y: 2.43 }
      - { x: 1.47, y: 2.43 }
      - { x: 0, y: 2.43 }

