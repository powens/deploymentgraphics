<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deployment Graphics — 40k Mission Generator</title>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"
      integrity="sha512-CSBhVREyzHAjAFfBlIBakjoRUKp5h7VSweP0InR/pAJyptH7peuhCsqAI/snV+TwZmXZqoUklpXp6R6wMnYf5Q=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <style>
      :root {
        --bg: #0c0d10;
        --panel: #131418;
        --field: #1d2028;
        --border: #23262e;
        --border-bright: #2f333d;
        --text: #c9ccd4;
        --text-muted: #6b7080;
        --accent: #b9842f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      .app-header {
        display: flex;
        align-items: center;
        gap: 1.25rem;
        flex-wrap: wrap;
        padding: 0.75rem 1.25rem;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
      }

      .wordmark {
        font-weight: 800;
        letter-spacing: 0.04em;
        font-size: 1rem;
        color: #e7e9ee;
      }

      .wordmark span {
        color: var(--accent);
      }

      .control {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      .control-label {
        font-size: 0.6rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
      }

      select.field {
        appearance: none;
        background-color: var(--field);
        color: var(--text);
        border: 1px solid var(--border-bright);
        border-radius: 5px;
        padding: 0.45rem 1.8rem 0.45rem 0.65rem;
        font: inherit;
        font-size: 0.85rem;
        cursor: pointer;
        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6"><path d="M0 0l5 6 5-6z" fill="%23b9842f"/></svg>');
        background-repeat: no-repeat;
        background-position: right 0.6rem center;
      }

      .toggles {
        display: flex;
        gap: 1rem;
        padding-top: 0.15rem;
      }

      .toggle {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        font-size: 0.8rem;
        color: var(--text-muted);
      }

      .toggle input {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
      }

      .toggle .track {
        width: 34px;
        height: 18px;
        border-radius: 9px;
        background: var(--field);
        border: 1px solid var(--border-bright);
        position: relative;
        transition:
          background 0.15s,
          border-color 0.15s;
      }

      .toggle .track::after {
        content: "";
        position: absolute;
        left: 2px;
        top: 2px;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--text-muted);
        transition:
          transform 0.15s,
          background 0.15s;
      }

      .toggle input:checked + .track {
        background: rgba(185, 132, 47, 0.25);
        border-color: var(--accent);
      }

      .toggle input:checked + .track::after {
        transform: translateX(16px);
        background: var(--accent);
      }

      .toggle input:focus-visible + .track {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .actions {
        margin-left: auto;
        display: flex;
        gap: 0.5rem;
      }

      .btn {
        font: inherit;
        font-size: 0.82rem;
        font-weight: 600;
        border-radius: 5px;
        padding: 0.5rem 0.9rem;
        cursor: pointer;
        border: 1px solid transparent;
      }

      .btn.primary {
        background: var(--accent);
        color: #15110a;
        font-weight: 700;
      }

      .btn.ghost {
        background: var(--field);
        color: var(--text);
        border-color: var(--border-bright);
      }

      .btn:hover {
        filter: brightness(1.08);
      }

      .export-menu {
        position: relative;
      }

      .export-menu summary {
        list-style: none;
      }

      .export-menu summary::-webkit-details-marker {
        display: none;
      }

      .export-menu .menu {
        position: absolute;
        right: 0;
        top: calc(100% + 4px);
        background: var(--panel);
        border: 1px solid var(--border-bright);
        border-radius: 6px;
        padding: 4px;
        display: flex;
        flex-direction: column;
        min-width: 130px;
        z-index: 10;
      }

      .export-menu .menu button {
        background: none;
        border: none;
        color: var(--text);
        text-align: left;
        padding: 0.5rem 0.6rem;
        border-radius: 4px;
        cursor: pointer;
        font: inherit;
        font-size: 0.82rem;
      }

      .export-menu .menu button:hover {
        background: var(--field);
      }

      .export-menu .menu button:disabled {
        color: var(--text-muted);
        cursor: not-allowed;
      }

      .export-menu .menu button:disabled:hover {
        background: none;
      }

      .stage {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2.5rem 1.5rem;
        background: radial-gradient(circle at 50% 38%, #16181e, var(--bg));
      }

      .stage svg {
        width: min(960px, 100%);
        height: auto;
        max-height: 72vh;
      }

      .attribution {
        padding: 0.6rem 1.25rem;
        background: var(--panel);
        border-top: 1px solid var(--border);
        font-size: 0.72rem;
        color: var(--text-muted);
        text-align: center;
      }

      .attribution a {
        color: var(--accent);
        text-decoration: none;
      }

      .attribution a:hover {
        text-decoration: underline;
      }

      .stage-msg {
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .stage-msg.error {
        color: #d97056;
      }

      .tabs {
        display: flex;
        gap: 0.25rem;
        padding: 0 1.25rem;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
      }

      .tab {
        font: inherit;
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--text-muted);
        background: none;
        border: none;
        border-bottom: 2px solid transparent;
        padding: 0.6rem 0.9rem;
        cursor: pointer;
      }

      .tab[aria-selected="true"] {
        color: var(--text);
        border-bottom-color: var(--accent);
      }

      .tab:hover {
        color: var(--text);
      }

      .panel {
        background: var(--panel);
        border-bottom: 1px solid var(--border);
        padding: 0.85rem 1.25rem;
      }

      .panel[hidden] {
        display: none;
      }

      .panel-controls {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-end;
        gap: 1.25rem;
      }

      .reset-banner {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 0.8rem;
        color: var(--text-muted);
      }

      /* The class sets display:flex, which would otherwise override the
         user-agent [hidden] rule and leave the banner always visible. */
      .reset-banner[hidden] {
        display: none;
      }

      .field:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .toggle input:disabled + .track {
        opacity: 0.45;
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn:disabled:hover {
        filter: none;
      }

      .panel-yaml {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .yaml-editor {
        width: 100%;
        min-height: 240px;
        resize: vertical;
        background: var(--field);
        color: var(--text);
        border: 1px solid var(--border-bright);
        border-radius: 5px;
        padding: 0.65rem 0.75rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.8rem;
        line-height: 1.5;
        tab-size: 2;
      }

      .yaml-editor:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }

      .yaml-error {
        margin: 0;
        font-size: 0.8rem;
        color: #d97056;
        white-space: pre-wrap;
      }

      @media (max-width: 720px) {
        .app-header {
          gap: 0.85rem;
        }

        .wordmark {
          width: 100%;
        }

        .actions {
          margin-left: 0;
          width: 100%;
        }

        .actions .btn,
        .actions .export-menu {
          flex: 1;
        }

        .export-menu summary {
          text-align: center;
        }

        .stage {
          padding: 1.25rem 0.75rem;
        }

        .stage svg {
          max-height: 60vh;
        }
      }
    </style>
  </head>
  <body>
    <header class="app-header">
      <div class="wordmark">DEPLOYMENT<span>//</span>GRAPHICS</div>

      <div class="actions">
        <button id="copy-link" class="btn ghost" type="button">Copy link</button>
        <details class="export-menu" id="export-menu">
          <summary class="btn primary">Export ▾</summary>
          <div class="menu">
            <button id="export-png" type="button" disabled>PNG</button>
            <button id="export-svg" type="button" disabled>SVG</button>
          </div>
        </details>
      </div>
    </header>

    <nav class="tabs" role="tablist" aria-label="Editor mode">
      <button
        id="tab-controls"
        class="tab"
        type="button"
        role="tab"
        aria-selected="true"
        aria-controls="panel-controls"
      >
        Controls
      </button>
      <button
        id="tab-yaml"
        class="tab"
        type="button"
        role="tab"
        aria-selected="false"
        aria-controls="panel-yaml"
      >
        YAML
      </button>
    </nav>

    <section
      id="panel-controls"
      class="panel panel-controls"
      role="tabpanel"
      aria-labelledby="tab-controls"
    >
      <div id="reset-banner" class="reset-banner" hidden>
        <span>Editing raw YAML — controls are disabled.</span>
        <button id="reset-controls" class="btn ghost" type="button">
          Reset to controls
        </button>
      </div>

      <div class="control">
        <label class="control-label" for="mission">Mission</label>
        <!-- Options are populated by app.js (see MISSIONS). -->
        <select id="mission" class="field"></select>
      </div>

      <div class="control">
        <label class="control-label" for="terrain">Terrain</label>
        <!-- Options are populated by app.js (see TERRAINS). -->
        <select id="terrain" class="field"></select>
      </div>

      <div class="control">
        <span class="control-label">Options</span>
        <div class="toggles">
          <label class="toggle">
            <input id="show-grid" type="checkbox" />
            <span class="track"></span>
            1×1 Grid
          </label>
        </div>
      </div>
    </section>

    <section
      id="panel-yaml"
      class="panel panel-yaml"
      role="tabpanel"
      aria-labelledby="tab-yaml"
      hidden
    >
      <p id="yaml-error" class="yaml-error" role="alert" hidden></p>
      <textarea
        id="yaml-editor"
        class="yaml-editor"
        spellcheck="false"
        autocomplete="off"
        autocapitalize="off"
        aria-label="Raw config YAML"
      ></textarea>
    </section>

    <main class="stage" id="stage" aria-live="polite"></main>

    <footer class="attribution">
      Powered by
      <a href="https://40kdc.alpacasoft.dev" target="_blank" rel="noopener">40kdc-data</a>
    </footer>

    <script type="module" src="./app.js"></script>
  </body>
</html>
