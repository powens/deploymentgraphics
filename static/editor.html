<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deployment Graphics — Editor</title>
    <script
      src="https://cdn.jsdelivr.net/npm/js-yaml@5.1.0/dist/browser/js-yaml.umd.min.js"
      integrity="sha512-F0YKZiG6/cYx+qwveeItISG14AejgzXMrRJ8OXTTOIlAtH/STHK4mp+MPtvJCVkIfYVZvhbih/fXkDAxPpeOjQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <style>
      :root {
        --bg: #0c0d10; --panel: #131418; --field: #1d2028;
        --border: #23262e; --border-bright: #2f333d;
        --text: #c9ccd4; --text-muted: #6b7080; --accent: #b9842f;
        --accent-dim: rgba(185,132,47,0.18);
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; flex-direction: column;
        background: var(--bg); color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 13px; overflow: hidden;
      }
      .toolbar {
        display: flex; align-items: center; gap: 10px;
        padding: 8px 14px; background: var(--panel);
        border-bottom: 1px solid var(--border); flex-shrink: 0;
      }
      .wordmark { font-weight: 800; letter-spacing: 0.04em; font-size: 13px; color: #e7e9ee; margin-right: 6px; }
      .wordmark span { color: var(--accent); }
      .sep { width: 1px; height: 20px; background: var(--border-bright); margin: 0 4px; }
      .tool-group { display: flex; gap: 4px; }
      .tbtn {
        background: var(--field); color: var(--text-muted);
        border: 1px solid var(--border-bright); border-radius: 4px;
        padding: 4px 10px; font: inherit; font-size: 11px; font-weight: 600;
        cursor: pointer; letter-spacing: 0.03em; text-decoration: none;
        display: inline-flex; align-items: center;
      }
      .tbtn:hover { filter: brightness(1.1); }
      .tbtn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
      .tbtn.primary { background: var(--accent); color: #15110a; border-color: var(--accent); font-weight: 700; }
      .tbtn:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }
      .ml-auto { margin-left: auto; }
      .body { flex: 1; display: flex; overflow: hidden; }
      .palette {
        width: 176px; flex-shrink: 0;
        background: var(--panel); border-right: 1px solid var(--border);
        display: flex; flex-direction: column; overflow-y: auto; padding-bottom: 8px;
        user-select: none;
      }
      .pal-section-head {
        padding: 10px 12px 4px; font-size: 9px; font-weight: 700;
        letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted);
      }
      .pal-item {
        display: flex; align-items: center; gap: 8px;
        padding: 6px 12px; border-radius: 5px; margin: 1px 6px;
        cursor: grab; font-size: 12px; color: var(--text);
        border: 1px solid transparent;
      }
      .pal-item:hover { background: var(--field); border-color: var(--border-bright); }
      .pal-icon {
        width: 22px; height: 22px; border-radius: 3px; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center; font-size: 11px;
        background: rgba(128,128,128,0.2); border: 1px solid var(--border-bright);
      }
      .canvas-area {
        flex: 1; position: relative; overflow: hidden;
        background: radial-gradient(circle at 50% 45%, #16181e, #0c0d10);
        display: flex; align-items: center; justify-content: center;
      }
      .canvas-wrap { position: relative; }
      .canvas-wrap svg { display: block; }
      .canvas-wrap .overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        overflow: visible; pointer-events: none;
      }
      .canvas-hint {
        position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
        font-size: 10px; color: var(--text-muted); opacity: 0.5;
        pointer-events: none; white-space: nowrap; letter-spacing: 0.04em;
      }
      .inspector {
        width: 210px; flex-shrink: 0;
        background: var(--panel); border-left: 1px solid var(--border);
        display: flex; flex-direction: column; overflow-y: auto;
      }
      .insp-header {
        padding: 10px 12px 8px; border-bottom: 1px solid var(--border);
        font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
        text-transform: uppercase; color: var(--text-muted);
        display: flex; align-items: center; justify-content: space-between;
      }
      .insp-chip {
        background: var(--accent-dim); color: var(--accent);
        border-radius: 3px; padding: 2px 6px; font-size: 9px; font-weight: 700;
      }
      .insp-empty {
        flex: 1; display: flex; align-items: center; justify-content: center;
        font-size: 11px; color: var(--text-muted); text-align: center;
        padding: 16px; line-height: 1.5;
      }
      .insp-body { padding: 8px 12px; display: flex; flex-direction: column; gap: 8px; }
      .insp-field { display: flex; flex-direction: column; gap: 3px; }
      .insp-label {
        font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
        text-transform: uppercase; color: var(--text-muted);
      }
      .insp-row { display: flex; gap: 6px; align-items: center; }
      .coord-label { font-size: 11px; color: var(--text-muted); width: 20px; flex-shrink: 0; }
      .field-input {
        flex: 1; background: var(--field); border: 1px solid var(--border-bright);
        border-radius: 4px; padding: 4px 7px; font: inherit; font-size: 11px; color: var(--text);
      }
      .field-input:focus { outline: 1px solid var(--accent); }
      .field-select { width: 100%; }
      .del-btn {
        width: 100%; padding: 7px; margin-top: 8px;
        background: rgba(217,112,86,0.1); border: 1px solid rgba(217,112,86,0.3);
        border-radius: 5px; color: #d97056; font: inherit; font-size: 11px;
        font-weight: 600; cursor: pointer;
      }
      .del-btn:hover { background: rgba(217,112,86,0.2); }
      .statusbar {
        background: var(--panel); border-top: 1px solid var(--border);
        padding: 3px 14px; font-size: 10px; color: var(--text-muted);
        display: flex; gap: 16px; flex-shrink: 0; letter-spacing: 0.03em;
      }
      .statusbar a { color: var(--accent); text-decoration: none; }
      .statusbar a:hover { text-decoration: underline; }
      .modal-backdrop {
        position: fixed; inset: 0; background: rgba(0,0,0,0.6);
        display: flex; align-items: center; justify-content: center; z-index: 100;
      }
      .modal-backdrop[hidden] { display: none; }
      .modal {
        background: var(--panel); border: 1px solid var(--border-bright);
        border-radius: 8px; padding: 20px; min-width: 300px;
        display: flex; flex-direction: column; gap: 14px;
      }
      .modal h2 { margin: 0; font-size: 14px; color: var(--text); }
      .modal-field { display: flex; flex-direction: column; gap: 4px; }
      .modal-label {
        font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
        text-transform: uppercase; color: var(--text-muted);
      }
      .modal-select {
        appearance: none; background: var(--field); color: var(--text);
        border: 1px solid var(--border-bright); border-radius: 5px;
        padding: 6px 10px; font: inherit; font-size: 12px;
      }
      .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    </style>
  </head>
  <body>
    <header class="toolbar">
      <div class="wordmark">DEPLOYMENT<span>//</span>GRAPHICS</div>
      <div class="sep"></div>
      <div class="tool-group">
        <button id="btn-new" class="tbtn" type="button">New</button>
        <button id="btn-load" class="tbtn" type="button">Load Preset</button>
      </div>
      <div class="sep"></div>
      <div class="tool-group">
        <button id="tool-select" class="tbtn active" type="button">↖ Select</button>
      </div>
      <div class="sep"></div>
      <div class="tool-group">
        <button id="btn-snap" class="tbtn" type="button" title="Snap to 1″ grid">⊞ Snap</button>
        <button id="btn-grid" class="tbtn" type="button" title="Show grid">⊟ Grid</button>
      </div>
      <div class="ml-auto tool-group">
        <a href="./index.html" class="tbtn">← Viewer</a>
        <button id="btn-copy-yaml" class="tbtn primary" type="button">Copy YAML</button>
      </div>
    </header>

    <div class="body">
      <aside class="palette" id="palette" aria-label="Objects"></aside>

      <main class="canvas-area" id="canvas-area">
        <div class="canvas-wrap" id="canvas-wrap"></div>
        <div class="canvas-hint">Drag to move · R to rotate 90° · Del to delete</div>
      </main>

      <aside class="inspector" id="inspector" aria-label="Properties">
        <div class="insp-header">
          Properties
          <span class="insp-chip" id="insp-type-chip" hidden></span>
        </div>
        <div class="insp-empty" id="insp-empty">Select an object<br>to edit its properties</div>
        <div class="insp-body" id="insp-body" hidden></div>
      </aside>
    </div>

    <footer class="statusbar">
      <span id="status-preset">No preset loaded</span>
      <span id="status-cursor"></span>
      <span id="status-selection"></span>
      <span style="margin-left:auto" id="status-board">60×44 board</span>
      <span>Powered by <a href="https://40kdc.alpacasoft.dev" target="_blank" rel="noopener">40kdc-data</a></span>
    </footer>

    <div class="modal-backdrop" id="modal-load" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-load-title">
        <h2 id="modal-load-title">Load Preset</h2>
        <div class="modal-field">
          <label class="modal-label" for="modal-mission">Mission</label>
          <select id="modal-mission" class="modal-select"></select>
        </div>
        <div class="modal-field">
          <label class="modal-label" for="modal-terrain">Terrain Layout</label>
          <select id="modal-terrain" class="modal-select"></select>
        </div>
        <div class="modal-actions">
          <button id="modal-cancel" class="tbtn" type="button">Cancel</button>
          <button id="modal-confirm" class="tbtn primary" type="button">Load</button>
        </div>
      </div>
    </div>

    <script type="module" src="./editor.bundle.js"></script>
  </body>
</html>
